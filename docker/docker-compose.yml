version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: real_estate_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: real_estate
    ports:
     - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - real_estate_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: real_estate_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@realestate.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - real_estate_network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: real_estate_backend
    restart: always
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=postgres
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/real_estate
    ports:
      - "8000:8000"
    volumes:
      - ..:/workspace
      - backend_uploads:/workspace/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - real_estate_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  real_estate_network:
    driver: bridge
